{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<nav>
    <img src="{% static 'img/eqdom_logo.png' %}" alt="EQDOM" class="logo">
</nav>

<div class="page" style="max-width: 420px;">
    <h1>Inscription Conseiller EQDOM</h1>
    <form method="post">
        <div class="form-carte">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Créer mon compte</button>
        </div>
    </form>
    <p style="margin-top: 16px;">Déjà inscrit ? <a href="{% url 'login' %}" class="lien-retour" style="margin-top:0;">Se connecter</a></p>
</div>
